# ============================================================
# GitHub Actions CI — 生产仓库安全与质量校验
# 在 PR 和 main 推送时执行
# ============================================================

name: Verify Production Repository

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ==================== 密钥扫描 ====================
  secret-scan:
    name: Secret & PII Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: ".gitleaks.toml"
        continue-on-error: false

      - name: Check deny-list directories
        run: |
          echo "Checking deny-list directories..."
          DENY_DIRS=(
            "ai-job-knowledge-base/01-个人基础档案"
            "ai-job-knowledge-base/02-教育与工作经历"
            "ai-job-knowledge-base/03-项目与作品集"
            "ai-job-knowledge-base/04-技能与能力证据"
            "ai-job-knowledge-base/05-目标岗位与JD"
            "ai-job-knowledge-base/06-公司与行业情报"
            "ai-job-knowledge-base/07-面试题库"
            "ai-job-knowledge-base/08-求职材料"
            "ai-job-knowledge-base/09-求职进度"
            "ai-job-knowledge-base/10-面试与求职复盘"
            "ai-job-knowledge-base/11-AI学习与行业知识"
            "data/rag"
            "logs"
            "backups"
            ".wp-env-runtime"
            "node_modules"
            ".venv"
            "venv"
          )
          FAILED=0
          for dir in "${DENY_DIRS[@]}"; do
            if [ -d "$dir" ] || [ -f "$dir" ]; then
              echo "::error::Deny-list item found: $dir"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "Deny-list check FAILED"
            exit 1
          fi
          echo "Deny-list check PASSED"

      - name: Scan for .env files
        run: |
          ENV_FILES=$(find . -name ".env" -not -name ".env.example" -not -name ".env.demo.example" 2>/dev/null || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::Unauthorized .env files found: $ENV_FILES"
            exit 1
          fi

  # ==================== Python 测试 ====================
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd rag-api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit & integration tests
        run: |
          cd rag-api
          python -m pytest ../tests/unit/ ../tests/integration/ \
            -v --tb=short --timeout=120 \
            --ignore=../tests/integration/test_qdrant_real.py \
            -k "not qdrant" 2>/dev/null || \
          python -m pytest ../tests/unit/ ../tests/demo/ -v --tb=short

      - name: Run privacy tests
        run: |
          cd rag-api
          python -m pytest ../tests/privacy/ -v --tb=short

      - name: Verify imports
        run: |
          cd rag-api
          python -c "
          import sys
          sys.path.insert(0, '.')
          from rag_app.public_main import app
          print('public_main imports OK')
          "

  # ==================== WordPress 校验 ====================
  wordpress-check:
    name: WordPress Theme & Plugin Check
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Validate theme structure
        run: |
          THEME_DIR="wordpress/themes/zwd-portfolio"
          required=("style.css" "index.php" "theme.json")
          for f in "${required[@]}"; do
            if [ ! -f "$THEME_DIR/$f" ]; then
              echo "::error::Missing required theme file: $f"
              exit 1
            fi
          done
          echo "Theme structure: PASSED"

      - name: Validate plugin structure
        run: |
          PLUGIN_DIR="wordpress/plugins/zwd-portfolio-core"
          if [ ! -f "$PLUGIN_DIR/zwd-portfolio-core.php" ]; then
            echo "::error::Missing plugin main file"
            exit 1
          fi
          echo "Plugin structure: PASSED"

  # ==================== Docker Compose 校验 ====================
  compose-check:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: |
          cp deploy/production.env.example deploy/.env.production
          docker compose -f deploy/docker-compose.production.yml config -q

      - name: Check Dockerfile syntax
        run: |
          echo "Dockerfile exists:"
          ls -la rag-api/Dockerfile

  # ==================== 前端校验 ====================
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Check for build artifacts
        run: |
          BUILD_DIR="wordpress/themes/zwd-portfolio/assets/build"
          if [ -d "$BUILD_DIR" ]; then
            echo "Build artifacts found:"
            find "$BUILD_DIR" -type f
          else
            echo "::warning::No build directory found at $BUILD_DIR"
          fi

      - name: Check JavaScript syntax
        run: |
          JS_FILES=$(find wordpress/themes/zwd-portfolio/assets -name "*.js" 2>/dev/null || true)
          if [ -n "$JS_FILES" ]; then
            for f in $JS_FILES; do
              node -c "$f" 2>/dev/null || echo "::warning::Syntax check skipped for $f"
            done
          fi

  # ==================== 同步清单验证 ====================
  manifest-check:
    name: Manifest Verification
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest exists
        run: |
          if [ ! -f "manifests/public-source-manifest.json" ]; then
            echo "::error::Manifest file missing"
            exit 1
          fi

      - name: Verify manifest structure
        run: |
          python3 -c "
          import json
          with open('manifests/public-source-manifest.json') as f:
              m = json.load(f)
          required = ['version', 'total_files', 'files']
          for r in required:
              assert r in m, f'Missing key: {r}'
          assert m['total_files'] > 0, 'Manifest is empty'
          assert m['total_files'] == len(m['files']), 'Count mismatch'
          print(f'Manifest OK: {m[\"total_files\"]} files')
          "
