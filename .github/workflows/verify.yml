# ============================================================
# GitHub Actions CI — 生产仓库安全与脱敏校验闸门
# 对应方案 V2 阶段 I
# 所有 Job 均为阻塞型，禁止 continue-on-error / || 回退 / warning 放行
# ============================================================

name: Verify Production Repository

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ==================== 仓库边界 ====================
  repository-boundary:
    name: Repository Boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deny-list directories
        run: |
          set -e
          echo "Checking deny-list directories..."
          DENY_DIRS=(
            "private"
            "internal"
            "ai-job-knowledge-base"
            "data/rag"
            "logs"
            "backups"
            ".wp-env-runtime"
            "node_modules"
            "__pycache__"
          )
          FAILED=0
          for dir in "${DENY_DIRS[@]}"; do
            if [ -e "$dir" ]; then
              echo "::error::Deny-list item found: $dir"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "Deny-list check FAILED"
            exit 1
          fi
          echo "Deny-list check PASSED"

      - name: Check sensitive filenames
        run: |
          set -e
          echo "Checking sensitive filenames..."
          # 查找敏感文件（允许 .env.example / .env.demo.example / production.env.example）
          SENSITIVE=$(find . -path ./.git -prune -o -type f \( \
            -name "id_rsa" -o -name "id_ed25519" -o \
            -name "credentials*" -o -name "secret*" -o \
            -name "*.pem" -o -name "*.key" -o -name "*.pfx" -o \
            -name "*.sqlite" -o -name "*.db" -o -name "*.dump" -o -name "*.bak" \
            \) -print 2>/dev/null || true)
          # 过滤掉允许的 env 模板
          REAL_SENSITIVE=$(echo "$SENSITIVE" | grep -v -E '\.env\.example$|\.env\.demo\.example$|production\.env\.example$' || true)
          if [ -n "$REAL_SENSITIVE" ]; then
            echo "::error::Sensitive files found:"
            echo "$REAL_SENSITIVE"
            exit 1
          fi
          echo "Sensitive filename check PASSED"

      - name: Check necessary files tracked
        run: |
          set -e
          echo "Checking necessary files are tracked..."
          REQUIRED=(
            "rag-api/.env.example"
            "rag-api/.env.demo.example"
            "rag-api/configs/rag_config.public.yaml"
            "wordpress/themes/zwd-portfolio/assets/src/components/ProjectCarousel.js"
            ".github/workflows/verify.yml"
            ".gitleaks.toml"
            "manifests/source-sync-manifest.json"
            "manifests/repository-manifest.json"
            "tools/sync-public-source.ps1"
            "tools/verify-manifest.py"
            "tools/scan-secrets.py"
            "tools/verify-public-content.py"
          )
          FAILED=0
          for f in "${REQUIRED[@]}"; do
            if ! git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error::Required file not tracked: $f"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi
          echo "Necessary file tracking PASSED"

      - name: Check no real .env files
        run: |
          set -e
          # 查找真实 .env 文件（排除 .env.example / .env.demo.example）
          ENV_FILES=$(find . -path ./.git -prune -o -name ".env" -print -o -name ".env.production" -print -o -name "*.env.local" -print 2>/dev/null || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::Unauthorized .env files found: $ENV_FILES"
            exit 1
          fi
          echo "No real .env files PASSED"

  # ==================== 密钥与敏感信息扫描 ====================
  secret-scan:
    name: Secret & PII Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全历史扫描

      - name: Gitleaks scan (full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_VERSION: "8.30.1"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Custom PII & deny scan (workspace + history)
        run: |
          python tools/scan-secrets.py --history

  # ==================== 公开内容闸门 ====================
  public-content-gate:
    name: Public Content Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate public Markdown four-field gate
        run: |
          python tools/verify-public-content.py

      - name: Check contact info allowlist (phone + wechat + email)
        run: |
          python tools/scan-secrets.py
          # scan-secrets.py 内置精确 allowlist，同时检查手机号、微信号、邮箱
          # 只允许在批准文件中出现授权值，覆盖 Layer 3 全部 PII 检查

  # ==================== Manifest 校验 ====================
  manifest-check:
    name: Manifest Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify manifests
        run: |
          python tools/verify-manifest.py

      - name: Check repository-manifest matches git ls-files
        run: |
          set -e
          # 验证 repository-manifest 文件数与 git ls-files 一致（排除自身）
          GIT_COUNT=$(git ls-files | grep -v '^manifests/repository-manifest.json$' | wc -l)
          MANIFEST_COUNT=$(python -c "import json; print(len(json.load(open('manifests/repository-manifest.json'))['files']))")
          echo "Git tracked (excl manifest): $GIT_COUNT"
          echo "Manifest files: $MANIFEST_COUNT"
          if [ "$GIT_COUNT" -ne "$MANIFEST_COUNT" ]; then
            echo "::error::Manifest file count mismatch"
            exit 1
          fi
          echo "Manifest count check PASSED"

  # ==================== 同步策略测试 ====================
  sync-policy-test:
    name: Sync Policy Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install production test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r rag-api/requirements.txt pytest httpx

      - name: Run scanner tests
        run: |
          python -m pytest tests/security --noconftest -v

      - name: Validate HTTP and HTTPS Compose profiles
        run: |
          docker compose \
            -f deploy/docker-compose.production.yml \
            --env-file deploy/production.env.example \
            config --quiet
          docker compose \
            -f deploy/docker-compose.production.yml \
            -f deploy/docker-compose.https.yml \
            --env-file deploy/production.env.example \
            config --quiet

      - name: Validate sync script policy declarations
        run: |
          set -e
          echo "Validating sync script policy declarations..."
          # 真正的幂等、撤回删除和自有文件保护已由 TestSyncPolicy
          # 在临时源/目标目录中执行两次 PowerShell 同步完成验证。
          # 验证同步脚本白名单不含 configs/（生产配置独立维护）
          if grep -q "configs\\\\rag_config" tools/sync-public-source.ps1 || \
             grep -q "configs/rag_config" tools/sync-public-source.ps1; then
            echo "::error::Sync script still references configs/rag_config (should be removed)"
            exit 1
          fi
          echo "configs/ not in whitelist PASSED"

          # 验证同步脚本不排除 md/yaml/json/ps1
          if grep -q "Exclude.*\*\.ps1.*\*\.json.*\*\.md.*\*\.yaml" tools/sync-public-source.ps1; then
            echo "::error::Sync script excludes md/yaml/json/ps1 from scan"
            exit 1
          fi
          echo "No file-type exclusion PASSED"

          # 验证四字段门槛存在
          if ! grep -q "PublicRequiredFields" tools/sync-public-source.ps1; then
            echo "::error::Sync script missing four-field gate"
            exit 1
          fi
          echo "Four-field gate present PASSED"

          # 验证 Manifest 无 synced_at（幂等）
          if grep -q "synced_at" tools/sync-public-source.ps1; then
            echo "::error::Sync script still writes per-file synced_at (breaks idempotency)"
            exit 1
          fi
          echo "No per-file synced_at (idempotent) PASSED"

      - name: Verify public content has exactly 9 markdown files
        run: |
          set -e
          MD_COUNT=$(find public-content -name "*.md" | wc -l)
          echo "Public markdown count: $MD_COUNT"
          if [ "$MD_COUNT" -ne 9 ]; then
            echo "::error::Expected 9 public markdown files, got $MD_COUNT"
            exit 1
          fi
          echo "Public content count PASSED"
