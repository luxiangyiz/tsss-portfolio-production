services:
  nginx:
    image: nginx:1.30.4-alpine
    container_name: zwd-nginx
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_FILTER: ^DOMAIN$
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/site-http.conf.template:/etc/nginx/templates/default.conf.template:ro
      - wordpress_data:/var/www/html:ro
      - ../wordpress/themes/zwd-portfolio:/var/www/html/wp-content/themes/zwd-portfolio:ro
      - ../wordpress/plugins/zwd-portfolio-core:/var/www/html/wp-content/plugins/zwd-portfolio-core:ro
      - certbot_www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - zwd_net
    depends_on:
      wordpress:
        condition: service_healthy
      rag-api:
        condition: service_healthy
    mem_limit: 64m
    mem_reservation: 32m
    logging: &default-logging
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  wordpress:
    image: wordpress:7.0.1-php8.3-fpm-alpine
    container_name: zwd-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-mysql}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', false);
        define('WP_DEBUG_LOG', false);
        define('WP_DEBUG_DISPLAY', false);
        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', true);
        define('WP_AUTO_UPDATE_CORE', false);
        define('DISABLE_WP_CRON', true);
        define('FORCE_SSL_ADMIN', filter_var('${WORDPRESS_FORCE_SSL_ADMIN:-false}', FILTER_VALIDATE_BOOLEAN));
        define('WP_HOME', '${WORDPRESS_SITE_URL}');
        define('WP_SITEURL', '${WORDPRESS_SITE_URL}');
        define('WP_ENVIRONMENT_TYPE', 'production');
        define('ZWD_RAG_PUBLIC_URL', '/api/rag/public/ask');
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wordpress_data:/var/www/html
      - ../wordpress/themes/zwd-portfolio:/var/www/html/wp-content/themes/zwd-portfolio:ro
      - ../wordpress/plugins/zwd-portfolio-core:/var/www/html/wp-content/plugins/zwd-portfolio-core:ro
      - ../public-content:/var/www/html/wp-content/zwd-public-sources:ro
      - ./php/zz-zwd-fpm.conf:/usr/local/etc/php-fpm.d/zz-zwd.conf:ro
      - ./php/zz-zwd-opcache.ini:/usr/local/etc/php/conf.d/zz-zwd-opcache.ini:ro
    networks:
      - zwd_net
    depends_on:
      mysql:
        condition: service_healthy
    mem_limit: 320m
    mem_reservation: 192m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8.0.46
    container_name: zwd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB_NAME:-wordpress}
      MYSQL_USER: ${MYSQL_DB_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - zwd_net
    expose:
      - "3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=96M
      - --innodb-log-buffer-size=8M
      - --max-connections=30
      - --table-open-cache=256
      - --tmp-table-size=16M
      - --max-heap-table-size=16M
      - --performance-schema=OFF
      - --skip-name-resolve=ON
      - --max-allowed-packet=32M
    mem_limit: 384m
    mem_reservation: 256m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  rag-api:
    build:
      context: ../rag-api
      dockerfile: Dockerfile
    image: zwd-rag-api:${APP_VERSION:-latest}
    container_name: zwd-rag-api
    restart: unless-stopped
    environment: &rag-environment
      RAG_RUNTIME_MODE: real_remote
      APP_ENV: production
      ALLOW_FAKE_MODE: "false"
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      CORS_ORIGINS: ${CORS_ORIGINS}
      RAG_CONFIG_PATH: /app/configs/rag_config.yaml
      RAG_DATA_DIR: /app/data/rag
      QDRANT_PATH: /app/data/rag/qdrant
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY}
      RAG_REQUEST_TIMEOUT: ${RAG_REQUEST_TIMEOUT:-45}
      RAG_MAX_INPUT_LENGTH: ${RAG_MAX_INPUT_LENGTH:-500}
      RAG_MAX_CONCURRENT: ${RAG_MAX_CONCURRENT:-2}
      PUBLIC_EXPECTED_DOCUMENTS: ${PUBLIC_EXPECTED_DOCUMENTS:-9}
      LOG_DIR: /app/logs
      LOG_LEVEL: WARNING
      DEFAULT_INDEX_SCOPE: public
    volumes:
      - ../public-content:/app/public-content:ro
      - rag_data:/app/data/rag
      - rag_logs:/app/logs
    networks:
      - zwd_net
    expose:
      - "8000"
    mem_limit: 512m
    mem_reservation: 320m
    logging: *default-logging
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/public/health/live', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  rag-index:
    build:
      context: ../rag-api
      dockerfile: Dockerfile
    image: zwd-rag-api:${APP_VERSION:-latest}
    profiles: ["tools"]
    environment: *rag-environment
    volumes:
      - ../public-content:/app/public-content:ro
      - rag_data:/app/data/rag
      - rag_logs:/app/logs
    networks:
      - zwd_net
    entrypoint: ["python", "-m", "rag_app.cli"]
    command: ["index", "--scope", "public", "--mode", "incremental"]
    mem_limit: 512m
    logging: *default-logging

  wp-cli:
    image: wordpress:cli-2.12.0-php8.3
    profiles: ["admin"]
    user: "82:82"
    environment:
      HOME: /tmp
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-mysql}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - wordpress_data:/var/www/html
      - ../wordpress/themes/zwd-portfolio:/var/www/html/wp-content/themes/zwd-portfolio:ro
      - ../wordpress/plugins/zwd-portfolio-core:/var/www/html/wp-content/plugins/zwd-portfolio-core:ro
      - ../public-content:/var/www/html/wp-content/zwd-public-sources:ro
    networks:
      - zwd_net
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["wp", "--path=/var/www/html"]
    command: ["core", "is-installed"]
    mem_limit: 192m
    logging: *default-logging

  certbot:
    image: certbot/certbot:v5.7.0
    profiles: ["tls"]
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: ["certbot"]
    mem_limit: 128m
    logging: *default-logging

networks:
  zwd_net:
    driver: bridge
    name: zwd_network

volumes:
  mysql_data:
    name: zwd_mysql_data
  wordpress_data:
    name: zwd_wordpress_data
  rag_data:
    name: zwd_rag_data
  certbot_www:
    name: zwd_certbot_www
  letsencrypt:
    name: zwd_letsencrypt
  nginx_logs:
    name: zwd_nginx_logs
  rag_logs:
    name: zwd_rag_logs
