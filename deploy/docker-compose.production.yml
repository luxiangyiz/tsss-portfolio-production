# ============================================================
# 生产 Docker Compose — 钟伟达个人网站
# 服务: Nginx, WordPress/PHP, MySQL, FastAPI(RAG), Qdrant
# 目标: 阿里云 ECS 广州地域
# ============================================================

version: "3.8"

services:
  # ==================== Nginx 入口 ====================
  nginx:
    image: nginx:1.27-alpine
    container_name: zwd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
      # 证书目录（备案后挂载）
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/certbot:ro
    networks:
      - zwd_net
    depends_on:
      wordpress:
        condition: service_healthy
      rag-api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== WordPress/PHP ====================
  wordpress:
    image: wordpress:6.7-php8.3-fpm-alpine
    container_name: zwd-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-mysql}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', false);
        define('WP_DEBUG_LOG', false);
        define('WP_DEBUG_DISPLAY', false);
        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', true);
        define('WP_AUTO_UPDATE_CORE', false);
        define('FORCE_SSL_ADMIN', true);
        define('WP_HOME', '${WORDPRESS_SITE_URL:-https://example.com}');
        define('WP_SITEURL', '${WORDPRESS_SITE_URL:-https://example.com}');
        define('WP_ENVIRONMENT_TYPE', 'production');
    volumes:
      - wordpress_data:/var/www/html
      # 主题 — 只读挂载
      - ../wordpress/themes/zwd-portfolio:/var/www/html/wp-content/themes/zwd-portfolio:ro
      # 插件 — 只读挂载
      - ../wordpress/plugins/zwd-portfolio-core:/var/www/html/wp-content/plugins/zwd-portfolio-core:ro
    networks:
      - zwd_net
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: zwd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB_NAME:-wordpress}
      MYSQL_USER: ${MYSQL_DB_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - zwd_net
    # 不暴露公网端口
    expose:
      - "3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-allowed-packet=64M
      - --innodb-buffer-pool-size=128M
      - --performance-schema=OFF
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==================== 公开 RAG API ====================
  rag-api:
    build:
      context: ../rag-api
      dockerfile: Dockerfile
    image: zwd-rag-api:latest
    container_name: zwd-rag-api
    restart: unless-stopped
    environment:
      # 运行时模式
      RAG_RUNTIME_MODE: ${RAG_RUNTIME_MODE:-real_remote}
      APP_ENV: production
      ALLOW_FAKE_MODE: "false"

      # 服务绑定
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      CORS_ORIGINS: ${CORS_ORIGINS:-}

      # Qdrant 连接
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}

      # 向量嵌入配置
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}

      # LLM 配置
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}

      # 超时与限制
      RAG_REQUEST_TIMEOUT: ${RAG_REQUEST_TIMEOUT:-45}
      RAG_MAX_INPUT_LENGTH: ${RAG_MAX_INPUT_LENGTH:-500}
    volumes:
      - rag_logs:/app/logs
    networks:
      - zwd_net
    # 不暴露公网端口
    expose:
      - "8000"
    depends_on:
      qdrant:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==================== Qdrant 向量数据库 ====================
  qdrant:
    image: qdrant/qdrant:v1.13
    container_name: zwd-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - zwd_net
    # 不暴露公网端口
    expose:
      - "6333"
      - "6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__LOG_LEVEL: "WARN"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ==================== 网络 ====================
networks:
  zwd_net:
    driver: bridge
    name: zwd_network
    internal: false

# ==================== 持久化卷 ====================
volumes:
  mysql_data:
    name: zwd_mysql_data
  wordpress_data:
    name: zwd_wordpress_data
  qdrant_data:
    name: zwd_qdrant_data
  nginx_logs:
    name: zwd_nginx_logs
  rag_logs:
    name: zwd_rag_logs
