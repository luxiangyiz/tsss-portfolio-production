# ============================================================
# Nginx 生产配置 — 钟伟达个人网站
# 唯一业务入口，代理 WordPress 和公开 RAG API
# ============================================================

upstream wordpress_backend {
    server wordpress:80;
    keepalive 16;
}

upstream rag_api_backend {
    server rag-api:8000;
    keepalive 8;
}

# 限流配置
limit_req_zone $binary_remote_addr zone=rag_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=site_limit:10m rate=60r/m;

# 请求体大小限制
client_max_body_size 10m;

# HTTP → HTTPS 重定向（备案后启用）
server {
    listen 80;
    server_name _;

    # 备案前返回受限访问
    # 备案后改为 301 重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # ACME 验证路径（Let's Encrypt）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS 主站（备案 + 证书后启用）
server {
    listen 443 ssl http2;
    server_name _;

    # TLS 配置（证书路径在 Compose 中挂载）
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ========== 公开 RAG API ==========
    location /api/rag/ {
        limit_req zone=rag_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://rag_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # RAG 超时设置（问答可能需要较长时间）
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;

        # 隐藏内部服务头
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ========== WordPress 站点 ==========
    location / {
        limit_req zone=site_limit burst=20 nodelay;

        proxy_pass http://wordpress_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # 静态资源 — 长缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://wordpress_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
    }

    # 禁止直接访问内部 API
    location ~ ^/(wp-includes|wp-admin|xmlrpc\.php) {
        # 仅在需要 WordPress 管理时开放
        allow 127.0.0.1;
        deny all;
    }
}
